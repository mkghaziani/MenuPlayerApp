name: Build MenuPlayer APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:   # allows manual trigger from GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout code ─────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up JDK 17 ─────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── 3. Cache Gradle dependencies (speeds up future builds) ────────────
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # ── 4. Make gradlew executable ────────────────────────────────────────
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # ── 5. Build debug APK (always works, no signing needed) ─────────────
      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      # ── 6. Upload debug APK as artifact ───────────────────────────────────
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: MenuPlayer-debug-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      # ── 7. Build release APK (unsigned — install via adb) ─────────────────
      - name: Build Release APK (unsigned)
        run: ./gradlew assembleRelease --stacktrace

      # ── 8. Upload release APK ─────────────────────────────────────────────
      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: MenuPlayer-release-APK
          path: app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 30

      # ── 9. Print summary ──────────────────────────────────────────────────
      - name: Build Summary
        run: |
          echo "✅ Build complete!"
          echo "Server: https://banquet.thesmarterp.com/"
          echo "Screen ID: screen001"
          find app/build/outputs/apk -name "*.apk" -exec ls -lh {} \;
